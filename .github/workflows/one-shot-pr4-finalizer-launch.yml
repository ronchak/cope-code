name: one-shot-pr4-finalizer-launch

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall
    paths:
      - .github/workflows/one-shot-pr4-finalizer-launch.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - name: Confirm the settled branch
        run: git pull --ff-only origin agent/fix-visible-copilot-readiness-stall
      - name: Reuse and apply the reviewed final patch payload
        shell: python
        run: |
          import base64
          from pathlib import Path
          import re
          import zlib

          workflow = Path('.github/workflows/one-shot-pr4-finalize-v2.yml').read_text(encoding='utf-8')
          chunks = re.findall(r'^\s+PATCH(\d+):\s+([A-Za-z0-9+/=]+)\s*$', workflow, re.MULTILINE)
          ordered = sorted(((int(index), value) for index, value in chunks))
          if [index for index, _ in ordered] != list(range(1, len(ordered) + 1)) or not ordered:
            raise RuntimeError('final patch payload is incomplete')
          source = zlib.decompress(base64.b64decode(''.join(value for _, value in ordered))).decode()
          exec(compile(source, 'pr4-finalizer.py', 'exec'))
      - name: Publish the final inspectable code state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m "Finish PR 4 dialog and readiness hardening"
          git pull --rebase origin agent/fix-visible-copilot-readiness-stall
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run check
