name: one-time-0.1.2-release

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall

permissions:
  contents: write

jobs:
  bump:
    if: github.event.head_commit.message == 'Apply coherent Cope 0.1.2 release bump'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply release metadata
        shell: python
        run: |
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          OLD = "0.1.1"
          NEW = "0.1.2"

          def replace_exact(path: str, old: str, new: str, expected: int) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != expected:
                  raise RuntimeError(f"{path}: expected {expected} occurrences of {old!r}, found {count}")
              file.write_text(text.replace(old, new), encoding="utf-8", newline="\n")

          replace_exact("package.json", '"version": "0.1.1"', '"version": "0.1.2"', 1)
          replace_exact("package-lock.json", '"version": "0.1.1"', '"version": "0.1.2"', 2)
          replace_exact(
              "src/cli/commands.ts",
              'export const CLI_VERSION = "0.1.1";',
              'export const CLI_VERSION = "0.1.2";',
              1,
          )
          replace_exact("scripts/install-windows.ps1", OLD, NEW, 2)
          replace_exact("START-HERE.txt", "COPE 0.1.1 FOR WINDOWS", "COPE 0.1.2 FOR WINDOWS", 1)
          replace_exact(
              "docs/WINDOWS-TARGET.md",
              "For the 0.1.1 personal-preview release",
              "For the 0.1.2 personal-preview release",
              1,
          )
          replace_exact("tests/unit/cli-user-experience.test.ts", OLD, NEW, 4)
          replace_exact(
              "tests/unit/cli-user-experience.test.ts",
              r"v0\.1\.1",
              r"v0\.1\.2",
              2,
          )

          installer_bytes = (
              Path("scripts/install-windows.ps1")
              .read_text(encoding="utf-8")
              .replace("\r\n", "\n")
              .encode("utf-8")
          )
          installer_hash = hashlib.sha256(installer_bytes).hexdigest()
          preservation = Path("tests/unit/windows-preservation.test.ts")
          preservation_text = preservation.read_text(encoding="utf-8")
          old_hash_line = '"scripts/install-windows.ps1": "8f00cb314fea2be37f19db667c3e78ccd975a6cdb612ddd063b1119d3fb354e6"'
          if preservation_text.count(old_hash_line) != 1:
              raise RuntimeError("Windows installer baseline hash marker changed unexpectedly")
          preservation.write_text(
              preservation_text.replace(
                  old_hash_line,
                  f'"scripts/install-windows.ps1": "{installer_hash}"',
              ),
              encoding="utf-8",
              newline="\n",
          )

          release_notes = Path("docs/RELEASE-NOTES-0.1.2.md")
          if release_notes.exists():
              raise RuntimeError("docs/RELEASE-NOTES-0.1.2.md already exists")
          release_notes.write_text(
              """# Cope 0.1.2

Cope 0.1.2 fixes the first live target-machine Edge transport failures found after 0.1.1.

## Fixed

- The dedicated Edge context no longer remains pinned to a startup `about:blank` tab.
- Replacement Copilot and Microsoft authentication tabs are tracked and brought forward without repeated focus stealing.
- Only the configured Copilot origin and chat path can become submission-capable.
- Persistent unknown and other non-authentication browser states return a bounded diagnostic instead of appearing hung for the full manual-authentication window.
- The Microsoft 365 Copilot locator contract covers the live composer and account-control variants while preserving identity, protection, host, and actionability gates.
- Alternating non-manual diagnostics and ambiguous multi-email account controls are regression-tested and fail closed.

## Distribution

The Windows installer keeps the same packed global installation behavior. Its banner and post-install version assertion now require 0.1.2. Historical 0.1.1 release notes remain unchanged.
""",
              encoding="utf-8",
              newline="\n",
          )

          historical = Path("docs/RELEASE-NOTES-0.1.1.md")
          if not historical.exists() or "# Cope 0.1.1" not in historical.read_text(encoding="utf-8"):
              raise RuntimeError("historical 0.1.1 release notes are missing or altered")

      - name: Verify lockfile scope
        shell: bash
        run: |
          test "$(git diff --numstat -- package-lock.json | awk '{print $1+$2}')" -eq 4
          test "$(git diff -- package-lock.json | grep -c '^[-+] *\"version\": \"0\.1\.[12]\"')" -eq 4
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - name: Commit release bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/cli/commands.ts scripts/install-windows.ps1 START-HERE.txt docs/WINDOWS-TARGET.md docs/RELEASE-NOTES-0.1.2.md tests/unit/cli-user-experience.test.ts tests/unit/windows-preservation.test.ts
          git commit -m "Release Cope 0.1.2"
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
