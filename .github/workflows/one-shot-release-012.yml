name: one-shot-cope-012-release

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.head.ref == 'agent/fix-visible-copilot-readiness-stall'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - id: bump
        name: Apply coherent 0.1.2 release metadata
        shell: python
        run: |
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path

          OLD = "0.1.1"
          NEW = "0.1.2"

          package = Path("package.json")
          package_json = json.loads(package.read_text(encoding="utf-8"))
          current = package_json.get("version")
          if current == NEW:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write("changed=false\n")
              raise SystemExit(0)
          if current != OLD:
              raise RuntimeError(f"Unexpected package version: {current!r}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("changed=true\n")

          def replace_exact(path: str, old: str, new: str, expected: int) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != expected:
                  raise RuntimeError(f"{path}: expected {expected} occurrences of {old!r}, found {count}")
              file.write_text(text.replace(old, new), encoding="utf-8", newline="\n")

          package_json["version"] = NEW
          package.write_text(json.dumps(package_json, indent=2) + "\n", encoding="utf-8", newline="\n")

          lock = Path("package-lock.json")
          lock_text = lock.read_text(encoding="utf-8")
          lock_marker = f'"version": "{OLD}"'
          if lock_text.count(lock_marker) != 2:
              raise RuntimeError("package-lock.json does not contain exactly two root release-version markers")
          lock.write_text(
              lock_text.replace(lock_marker, f'"version": "{NEW}"'),
              encoding="utf-8",
              newline="\n",
          )

          replace_exact(
              "src/cli/commands.ts",
              f'export const CLI_VERSION = "{OLD}";',
              f'export const CLI_VERSION = "{NEW}";',
              1,
          )
          replace_exact("scripts/install-windows.ps1", OLD, NEW, 2)
          replace_exact("START-HERE.txt", OLD, NEW, 1)
          replace_exact("README.md", OLD, NEW, 1)
          replace_exact("docs/WINDOWS-TARGET.md", OLD, NEW, 1)
          replace_exact("tests/unit/cli-user-experience.test.ts", OLD, NEW, 3)

          installer_bytes = (
              Path("scripts/install-windows.ps1")
              .read_text(encoding="utf-8")
              .replace("\r\n", "\n")
              .encode("utf-8")
          )
          installer_hash = hashlib.sha256(installer_bytes).hexdigest()
          preservation = Path("tests/unit/windows-preservation.test.ts")
          preservation_text = preservation.read_text(encoding="utf-8")
          old_hash_line = '"scripts/install-windows.ps1": "8f00cb314fea2be37f19db667c3e78ccd975a6cdb612ddd063b1119d3fb354e6"'
          if preservation_text.count(old_hash_line) != 1:
              raise RuntimeError("Windows installer baseline hash marker changed unexpectedly")
          preservation.write_text(
              preservation_text.replace(
                  old_hash_line,
                  f'"scripts/install-windows.ps1": "{installer_hash}"',
              ),
              encoding="utf-8",
              newline="\n",
          )

          release_notes = Path("docs/RELEASE-NOTES-0.1.2.md")
          if release_notes.exists():
              raise RuntimeError("docs/RELEASE-NOTES-0.1.2.md already exists")
          release_notes.write_text(
              """# Cope 0.1.2

Cope 0.1.2 fixes the first live target-machine Edge transport failures found after 0.1.1.

## Fixed

- The dedicated Edge context no longer remains pinned to a startup `about:blank` tab.
- Replacement Copilot and genuine Microsoft authentication tabs are tracked, bounded, and brought forward without repeated focus stealing.
- Only the configured Copilot origin and chat path can become submission-capable.
- Unrelated M365 and Office pages cannot qualify as authentication redirects by host alone.
- Persistent unknown and other non-authentication browser states now return a bounded diagnostic instead of appearing hung for the full manual-authentication window.
- The current Microsoft 365 Copilot locator contract covers the live composer and account-control variants while preserving identity, protection, host, and actionability gates.
- Exact email identity matching, ordered display-name matching, assistant-response ownership, and replacement-page timeouts are regression-tested.

## Distribution

The Windows installer still performs the same packed global installation. Its banner and post-install version assertion now require 0.1.2. Historical 0.1.1 release notes remain unchanged.
""",
              encoding="utf-8",
              newline="\n",
          )

          historical = Path("docs/RELEASE-NOTES-0.1.1.md")
          if not historical.exists() or OLD not in historical.read_text(encoding="utf-8"):
              raise RuntimeError("historical 0.1.1 release notes are missing or were altered")

      - if: steps.bump.outputs.changed == 'true'
        name: Verify the lockfile change is version-only
        shell: bash
        run: |
          git diff -- package-lock.json
          test "$(git diff --numstat -- package-lock.json | awk '{print $1+$2}')" -eq 4
      - if: steps.bump.outputs.changed == 'true'
        run: npm ci --no-audit --no-fund
      - if: steps.bump.outputs.changed == 'true'
        run: npm run check
      - if: steps.bump.outputs.changed == 'true'
        name: Commit release bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/cli/commands.ts scripts/install-windows.ps1 START-HERE.txt README.md docs/WINDOWS-TARGET.md docs/RELEASE-NOTES-0.1.2.md tests/unit/cli-user-experience.test.ts tests/unit/windows-preservation.test.ts
          git commit -m "Release Cope 0.1.2"
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
