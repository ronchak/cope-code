name: pr4-debug

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall

jobs:
  capture-check-failure:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Capture npm run check
        id: check
        continue-on-error: true
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "pr4-check.log"
          & npm.cmd run check *> $log
          $code = $LASTEXITCODE
          Write-Host "CHECK_EXIT_CODE=$code"
          Write-Host "--- focused failure lines ---"
          Select-String -Path $log -Pattern 'error TS|not ok|AssertionError|ERR_|# fail|Error:' -Context 2,4 |
            Select-Object -Last 30 |
            ForEach-Object { Write-Host $_.ToString() }
          Write-Host "--- final 50 lines ---"
          Get-Content $log -Tail 50
          if ($code -ne 0) { exit $code }
      - name: Upload complete check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr4-check-log
          path: ${{ runner.temp }}\pr4-check.log
      - name: Preserve failure status
        if: steps.check.outcome == 'failure'
        shell: pwsh
        run: exit 1
