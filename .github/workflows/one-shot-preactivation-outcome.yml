name: one-shot-preactivation-outcome

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall

permissions:
  contents: write

jobs:
  harden:
    if: github.event.head_commit.message == 'Trigger pre-activation outcome hardening'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Preserve known pre-dispatch outcomes
        shell: python
        run: |
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"{path}: expected exactly one replacement target")
              file.write_text(text.replace(old, new), encoding="utf-8", newline="\n")

          replace_exact(
              "src/browser/context-semantic-page.ts",
              '''  public async click(group: LocatorGroup): Promise<void> {
            const page = await this.#verifiedActivationPage();
            try {
              await this.#delegate(page).click(group);
            } finally {
              this.#clearFilledPagePin();
            }
          }

          /** Enter activation follows the same post-fill page-identity requirements. */
          public async press(group: LocatorGroup, key: "Enter"): Promise<void> {
            const page = await this.#verifiedActivationPage();
            try {
              await this.#delegate(page).press(group, key);
            } finally {
              this.#clearFilledPagePin();
            }
          }

          #verifiedObservedPage(): Page {
          '''.replace(/^          /gm, ""),
              '''  public async click(group: LocatorGroup): Promise<void> {
            const page = await this.#activationPageOrThrow();
            try {
              await this.#delegate(page).click(group);
            } finally {
              this.#clearFilledPagePin();
            }
          }

          /** Enter activation follows the same post-fill page-identity requirements. */
          public async press(group: LocatorGroup, key: "Enter"): Promise<void> {
            const page = await this.#activationPageOrThrow();
            try {
              await this.#delegate(page).press(group, key);
            } finally {
              this.#clearFilledPagePin();
            }
          }

          /**
           * Every failure before delegating click or Enter is conclusively
           * pre-dispatch. Preserve that fact for the adapter so a guarded failure
           * remains safely retryable instead of being treated as indeterminate.
           */
          async #activationPageOrThrow(): Promise<Page> {
            try {
              return await this.#verifiedActivationPage();
            } catch (error) {
              if (error instanceof AgentError && error.details.dispatchAttempted === false) {
                throw error;
              }
              const diagnosticCode =
                error instanceof AgentError && typeof error.details.diagnosticCode === "string"
                  ? error.details.diagnosticCode
                  : "PRE_ACTIVATION_GUARD_FAILED";
              throw new AgentError(
                "TRANSPORT_INDETERMINATE",
                "The Copilot pre-activation guard blocked browser activation",
                { diagnosticCode, dispatchAttempted: false },
                { cause: error },
              );
            }
          }

          #verifiedObservedPage(): Page {
          '''.replace(/^          /gm, ""),
          )

          replace_exact(
              "src/browser/copilot-browser-adapter.ts",
              '''    record.activationAttempted = true;
              this.#taskConversations.set(request.taskId, conversationId);
              try {
                if (strategy === "send-control") {
                  await this.#page.click(this.#config.uiContract.groups.send);
                } else {
                  await this.#page.press(this.#config.uiContract.groups.composer, "Enter");
                }
              } catch {
                // Playwright can throw after dispatch. Resolve only through page evidence.
              }

              record.receipt = await this.#confirmSubmission(record, options.signal);
          '''.replace(/^          /gm, ""),
              '''    record.activationAttempted = true;
              this.#taskConversations.set(request.taskId, conversationId);
              try {
                if (strategy === "send-control") {
                  await this.#page.click(this.#config.uiContract.groups.send);
                } else {
                  await this.#page.press(this.#config.uiContract.groups.composer, "Enter");
                }
              } catch (error) {
                const diagnosticCode = knownPreActivationDiagnostic(error);
                if (diagnosticCode !== undefined) {
                  record.activationAttempted = false;
                  if (establishedConversation === undefined) {
                    this.#taskConversations.delete(request.taskId);
                  }
                  record.receipt = this.#receipt(
                    request,
                    "not-submitted",
                    conversationId,
                    marker,
                    diagnosticCode,
                  );
                  return record.receipt;
                }
                // Playwright can throw after dispatch. Resolve only through page evidence.
              }

              record.receipt = await this.#confirmSubmission(record, options.signal);
          '''.replace(/^          /gm, ""),
          )

          replace_exact(
              "src/browser/copilot-browser-adapter.ts",
              '''function responseTexts(observation: CopilotPageObservation): readonly string[] {
          '''.replace(/^          /gm, ""),
              '''function knownPreActivationDiagnostic(error: unknown): string | undefined {
            if (!(error instanceof AgentError) || error.details.dispatchAttempted !== false) {
              return undefined;
            }
            const diagnosticCode = error.details.diagnosticCode;
            return typeof diagnosticCode === "string" && diagnosticCode.length > 0
              ? diagnosticCode
              : "PRE_ACTIVATION_GUARD_FAILED";
          }

          function responseTexts(observation: CopilotPageObservation): readonly string[] {
          '''.replace(/^          /gm, ""),
          )

          replace_exact(
              "tests/unit/browser-adapter.test.ts",
              '''import { MutableBrowserKillSwitch } from "../../src/browser/kill-switch.js";
          '''.replace(/^          /gm, ""),
              '''import { MutableBrowserKillSwitch } from "../../src/browser/kill-switch.js";
          import { AgentError } from "../../src/shared/errors.js";
          '''.replace(/^          /gm, ""),
          )

          replace_exact(
              "tests/unit/browser-adapter.test.ts",
              '''  public activationMode: ActivationMode = "submitted";
            public fillCalls = 0;
            public activationCalls = 0;
          '''.replace(/^          /gm, ""),
              '''  public activationMode: ActivationMode = "submitted";
            public preActivationDiagnostic: string | undefined = undefined;
            public fillCalls = 0;
            public activationCalls = 0;
          '''.replace(/^          /gm, ""),
          )

          replace_exact(
              "tests/unit/browser-adapter.test.ts",
              '''  public async click(): Promise<void> {
            await this.#activate();
          }

          public async press(): Promise<void> {
            await this.#activate();
          }

          async #activate(): Promise<void> {
          '''.replace(/^          /gm, ""),
              '''  public async click(): Promise<void> {
            this.#assertPreActivationGuard();
            await this.#activate();
          }

          public async press(): Promise<void> {
            this.#assertPreActivationGuard();
            await this.#activate();
          }

          #assertPreActivationGuard(): void {
            if (this.preActivationDiagnostic === undefined) return;
            throw new AgentError(
              "TRANSPORT_INDETERMINATE",
              "Synthetic pre-activation guard blocked dispatch",
              {
                diagnosticCode: this.preActivationDiagnostic,
                dispatchAttempted: false,
              },
            );
          }

          async #activate(): Promise<void> {
          '''.replace(/^          /gm, ""),
          )

          replace_exact(
              "tests/unit/browser-adapter.test.ts",
              '''test("failed activation remains indeterminate because dispatch timing cannot be proven", async () => {
          '''.replace(/^          /gm, ""),
              '''test("pre-activation guard failures are known not-submitted and safely retryable", async () => {
            const { adapter, page } = makeHarness();
            page.preActivationDiagnostic = "COMPOSER_CONTENT_CHANGED_BEFORE_SUBMIT";

            const first = await adapter.submit(request);
            assert.equal(first.status, "not-submitted");
            assert.equal(first.diagnosticCode, "COMPOSER_CONTENT_CHANGED_BEFORE_SUBMIT");
            assert.equal(page.activationCalls, 0);

            page.preActivationDiagnostic = undefined;
            page.url = "https://copilot.example.test/chat/conversation-2";
            const retry = await adapter.submit(request);
            assert.equal(retry.status, "submitted");
            assert.equal(page.activationCalls, 1);
          });

          test("failed activation remains indeterminate because dispatch timing cannot be proven", async () => {
          '''.replace(/^          /gm, ""),
          )
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - name: Commit pre-activation outcome hardening
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/browser/context-semantic-page.ts src/browser/copilot-browser-adapter.ts tests/unit/browser-adapter.test.ts
          git commit -m "Preserve known pre-activation submission outcomes"
          git pull --rebase origin agent/fix-visible-copilot-readiness-stall
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
