name: one-shot-pr4-final-blockers

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall
    paths:
      - .github/workflows/one-shot-pr4-finalize-v2.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Confirm the settled branch
        run: git pull --ff-only origin agent/fix-visible-copilot-readiness-stall
      - name: Apply the remaining PR 4 fixes
        shell: python
        env:
          PATCH1: 
          PATCH2: 
          PATCH3: 
          PATCH4: 
          PATCH5: 
        run: |
          import base64
          import os
          import zlib

          payload = "".join(os.environ[f"PATCH{index}"] for index in range(1, 6))
          source = zlib.decompress(base64.b64decode(payload)).decode()
          exec(compile(source, "pr4-finalizer.py", "exec"))
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Validate the exact staged code
        run: npm run check
      - name: Commit and push the exact tested state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m "Finish PR 4 dialog and readiness hardening"
          git pull --rebase origin agent/fix-visible-copilot-readiness-stall
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
