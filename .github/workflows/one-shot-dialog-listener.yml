name: one-shot-native-dialog-listener

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall

permissions:
  contents: write

jobs:
  fix:
    if: github.event.head_commit.message == 'Trigger native dialog listener attachment fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Attach native-dialog listeners before navigation and inspection
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"{path}: expected exactly one replacement target")
              file.write_text(text.replace(old, new), encoding="utf-8", newline="\n")

          replace_once(
              "src/browser/context-semantic-page.ts",
              '    this.#activePage = initialPage;\n'
              '    this.#actionMs = actionMs;\n'
              '    this.#configurePage(initialPage);\n'
              '  }\n',
              '    this.#activePage = initialPage;\n'
              '    this.#actionMs = actionMs;\n'
              '    this.#configurePage(initialPage);\n'
              '    // Attach the native-dialog listener at page creation time, not on\n'
              '    // the first later snapshot. Otherwise Playwright may auto-dismiss a\n'
              '    // dialog that appears in the pre-inspection window.\n'
              '    context.on("page", (page) => this.#configurePage(page));\n'
              '  }\n',
          )

          replace_once(
              "src/browser/context-semantic-page.ts",
              '    page.setDefaultTimeout(this.#actionMs);\n'
              '    page.setDefaultNavigationTimeout(this.#actionMs);\n'
              '    this.#configuredPages.add(page);\n'
              '  }\n',
              '    page.setDefaultTimeout(this.#actionMs);\n'
              '    page.setDefaultNavigationTimeout(this.#actionMs);\n'
              '    this.#configuredPages.add(page);\n'
              '    // Constructing the delegate installs the sticky native-dialog\n'
              '    // listener immediately. The WeakMap keeps this idempotent.\n'
              '    this.#delegate(page);\n'
              '  }\n',
          )

          replace_once(
              "src/browser/context-semantic-page.ts",
              '  let initial = approved[0];\n'
              '  if (initial === undefined) {\n'
              '    const authentication = existing.filter((page) =>\n'
              '      !page.isClosed() && isReusableExternalAuthenticationUrl(page.url(), config));\n'
              '    initial = authentication.at(-1);\n'
              '  }\n\n'
              '  if (initial === undefined) {\n'
              '    initial = await context.newPage();\n'
              '    initial.setDefaultTimeout(config.waits.actionMs);\n'
              '    initial.setDefaultNavigationTimeout(config.waits.actionMs);\n'
              '    await initial.bringToFront().catch(() => undefined);\n',
              '  let initial = approved[0];\n'
              '  if (initial === undefined) {\n'
              '    const authentication = existing.filter((page) =>\n'
              '      !page.isClosed() && isReusableExternalAuthenticationUrl(page.url(), config));\n'
              '    initial = authentication.at(-1);\n'
              '  }\n\n'
              '  let tracked: ContextSemanticPage | undefined;\n'
              '  if (initial === undefined) {\n'
              '    initial = await context.newPage();\n'
              '    // Start tracking before navigation so the initial page and any\n'
              '    replacement popup receive dialog listeners before they can emit.\n'
              '    tracked = new ContextSemanticPage(\n'
              '      context,\n'
              '      config,\n'
              '      initial,\n'
              '      config.waits.actionMs,\n'
              '    );\n'
              '    await initial.bringToFront().catch(() => undefined);\n',
          )

          replace_once(
              "src/browser/context-semantic-page.ts",
              '  const tracked = new ContextSemanticPage(\n'
              '    context,\n'
              '    config,\n'
              '    initial,\n'
              '    config.waits.actionMs,\n'
              '  );\n'
              '  await tracked.focusActivePage(true);\n'
              '  return tracked;\n',
              '  tracked ??= new ContextSemanticPage(\n'
              '    context,\n'
              '    config,\n'
              '    initial,\n'
              '    config.waits.actionMs,\n'
              '  );\n'
              '  await tracked.focusActivePage(true);\n'
              '  return tracked;\n',
          )

          replace_once(
              "tests/unit/context-semantic-page.test.ts",
              '  public defaultNavigationTimeout = 0;\n'
              '  public closed = false;\n'
              '  public onGoto?: (url: string) => Promise<Response | null>;\n',
              '  public defaultNavigationTimeout = 0;\n'
              '  public dialogListenerCount = 0;\n'
              '  public closed = false;\n'
              '  public onGoto?: (url: string) => Promise<Response | null>;\n',
          )
          replace_once(
              "tests/unit/context-semantic-page.test.ts",
              '  public setDefaultNavigationTimeout(milliseconds: number): void {\n'
              '    this.defaultNavigationTimeout = milliseconds;\n'
              '  }\n'
              '  public async goto(url: string): Promise<Response | null> {\n',
              '  public setDefaultNavigationTimeout(milliseconds: number): void {\n'
              '    this.defaultNavigationTimeout = milliseconds;\n'
              '  }\n'
              '  public on(event: string, _listener: (...args: readonly unknown[]) => void): this {\n'
              '    if (event === "dialog") this.dialogListenerCount += 1;\n'
              '    return this;\n'
              '  }\n'
              '  public async goto(url: string): Promise<Response | null> {\n',
          )
          replace_once(
              "tests/unit/context-semantic-page.test.ts",
              'class FakeContext {\n'
              '  public readonly pageList: FakePage[];\n'
              '  public newPageCalls = 0;\n'
              '  public nextPage?: FakePage;\n',
              'class FakeContext {\n'
              '  public readonly pageList: FakePage[];\n'
              '  public newPageCalls = 0;\n'
              '  public nextPage?: FakePage;\n'
              '  readonly #pageListeners: Array<(page: Page) => void> = [];\n',
          )
          replace_once(
              "tests/unit/context-semantic-page.test.ts",
              '  public pages(): Page[] { return this.pageList.map((page) => page.asPage()); }\n'
              '  public async newPage(): Promise<Page> {\n'
              '    this.newPageCalls += 1;\n'
              '    const page = this.nextPage ?? new FakePage("about:blank");\n'
              '    this.pageList.push(page);\n'
              '    return page.asPage();\n'
              '  }\n'
              '  public asContext(): BrowserContext { return this as unknown as BrowserContext; }\n',
              '  public pages(): Page[] { return this.pageList.map((page) => page.asPage()); }\n'
              '  public on(event: string, listener: (page: Page) => void): this {\n'
              '    if (event === "page") this.#pageListeners.push(listener);\n'
              '    return this;\n'
              '  }\n'
              '  public addPage(page: FakePage): void {\n'
              '    this.pageList.push(page);\n'
              '    for (const listener of this.#pageListeners) listener(page.asPage());\n'
              '  }\n'
              '  public async newPage(): Promise<Page> {\n'
              '    this.newPageCalls += 1;\n'
              '    const page = this.nextPage ?? new FakePage("about:blank");\n'
              '    this.addPage(page);\n'
              '    return page.asPage();\n'
              '  }\n'
              '  public asContext(): BrowserContext { return this as unknown as BrowserContext; }\n',
          )
          replace_once(
              "tests/unit/context-semantic-page.test.ts",
              '  assert.equal(navigationPage.defaultTimeout, config.waits.actionMs);\n'
              '  assert.equal(navigationPage.defaultNavigationTimeout, config.waits.actionMs);\n',
              '  assert.equal(navigationPage.defaultTimeout, config.waits.actionMs);\n'
              '  assert.equal(navigationPage.defaultNavigationTimeout, config.waits.actionMs);\n'
              '  assert.equal(navigationPage.dialogListenerCount, 1);\n'
              '  assert.equal(startupBlank.dialogListenerCount, 0);\n',
          )
          replace_once(
              "tests/unit/context-semantic-page.test.ts",
              '  navigationPage.onGoto = async () => {\n'
              '    context.pageList.push(replacement);\n'
              '    throw new Error("net::ERR_ABORTED");\n'
              '  };\n',
              '  navigationPage.onGoto = async () => {\n'
              '    assert.equal(navigationPage.dialogListenerCount, 1);\n'
              '    context.addPage(replacement);\n'
              '    assert.equal(replacement.dialogListenerCount, 1);\n'
              '    throw new Error("net::ERR_ABORTED");\n'
              '  };\n',
          )

          replace_once(
              "tests/unit/context-delayed-replacement.test.ts",
              '  public closed = false;\n'
              '  public onGoto?: () => Promise<Response | null>;\n',
              '  public closed = false;\n'
              '  public dialogListenerCount = 0;\n'
              '  public onGoto?: () => Promise<Response | null>;\n',
          )
          replace_once(
              "tests/unit/context-delayed-replacement.test.ts",
              '  public setDefaultNavigationTimeout(_milliseconds: number): void {}\n'
              '  public async goto(url: string): Promise<Response | null> {\n',
              '  public setDefaultNavigationTimeout(_milliseconds: number): void {}\n'
              '  public on(event: string, _listener: (...args: readonly unknown[]) => void): this {\n'
              '    if (event === "dialog") this.dialogListenerCount += 1;\n'
              '    return this;\n'
              '  }\n'
              '  public async goto(url: string): Promise<Response | null> {\n',
          )
          replace_once(
              "tests/unit/context-delayed-replacement.test.ts",
              'class DelayedContext {\n'
              '  public readonly pageList: DelayedPage[] = [new DelayedPage("about:blank")];\n'
              '  public navigationPage = new DelayedPage("about:blank");\n\n'
              '  public pages(): Page[] { return this.pageList.map((page) => page.asPage()); }\n'
              '  public async newPage(): Promise<Page> {\n'
              '    this.pageList.push(this.navigationPage);\n'
              '    return this.navigationPage.asPage();\n'
              '  }\n',
              'class DelayedContext {\n'
              '  public readonly pageList: DelayedPage[] = [new DelayedPage("about:blank")];\n'
              '  public navigationPage = new DelayedPage("about:blank");\n'
              '  readonly #pageListeners: Array<(page: Page) => void> = [];\n\n'
              '  public pages(): Page[] { return this.pageList.map((page) => page.asPage()); }\n'
              '  public on(event: string, listener: (page: Page) => void): this {\n'
              '    if (event === "page") this.#pageListeners.push(listener);\n'
              '    return this;\n'
              '  }\n'
              '  public addPage(page: DelayedPage): void {\n'
              '    this.pageList.push(page);\n'
              '    for (const listener of this.#pageListeners) listener(page.asPage());\n'
              '  }\n'
              '  public async newPage(): Promise<Page> {\n'
              '    this.addPage(this.navigationPage);\n'
              '    return this.navigationPage.asPage();\n'
              '  }\n',
          )
          replace_once(
              "tests/unit/context-delayed-replacement.test.ts",
              '  context.navigationPage.onGoto = async () => {\n'
              '    void delay(20).then(() => { context.pageList.push(replacement); });\n'
              '    throw new Error("net::ERR_ABORTED");\n'
              '  };\n',
              '  context.navigationPage.onGoto = async () => {\n'
              '    assert.equal(context.navigationPage.dialogListenerCount, 1);\n'
              '    void delay(20).then(() => { context.addPage(replacement); });\n'
              '    throw new Error("net::ERR_ABORTED");\n'
              '  };\n',
          )
          replace_once(
              "tests/unit/context-delayed-replacement.test.ts",
              '  assert.equal(await tracked.currentUrl(), replacement.currentUrl);\n',
              '  assert.equal(await tracked.currentUrl(), replacement.currentUrl);\n'
              '  assert.equal(replacement.dialogListenerCount, 1);\n',
          )

          replace_once(
              "tests/unit/context-action-pinning.test.ts",
              'class ActionContext {\n'
              '  public constructor(public readonly pageList: ActionPage[]) {}\n'
              '  public pages(): Page[] { return this.pageList.map((page) => page.asPage()); }\n'
              '  public asContext(): BrowserContext { return this as unknown as BrowserContext; }\n'
              '}\n',
              'class ActionContext {\n'
              '  public constructor(public readonly pageList: ActionPage[]) {}\n'
              '  public pages(): Page[] { return this.pageList.map((page) => page.asPage()); }\n'
              '  public on(_event: string, _listener: (page: Page) => void): this { return this; }\n'
              '  public asContext(): BrowserContext { return this as unknown as BrowserContext; }\n'
              '}\n',
          )
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - name: Commit dialog-listener fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/browser/context-semantic-page.ts tests/unit/context-semantic-page.test.ts tests/unit/context-delayed-replacement.test.ts tests/unit/context-action-pinning.test.ts
          git commit -m "Attach native dialog listeners before inspection"
          git pull --rebase origin agent/fix-visible-copilot-readiness-stall
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
