name: one-shot-final-review-fixes

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall

permissions:
  contents: write

jobs:
  fix:
    if: github.event.head_commit.message == 'Trigger final review fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply final review fixes
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"{path}: expected exactly one replacement target")
              file.write_text(text.replace(old, new), encoding="utf-8", newline="\n")

          replace_once(
              "src/browser/context-semantic-page.ts",
              '''  const approved = openPages.filter((page) => isConfiguredCopilotUrl(page.url(), config.entryUrl));
          if (approved.length > 1) {
            throw new AgentError("TRANSPORT_INDETERMINATE", "Multiple approved Copilot pages are open", {
              diagnosticCode: "AMBIGUOUS_COPILOT_PAGE",
              pageCount: approved.length,
            });
          }
          if (approved.length === 1) return approved[0]!;

          const authentication = openPages.filter((page) =>
            isGenuineManualAuthenticationUrl(page.url(), config));
          const newestAuthentication = authentication.at(-1);
          if (newestAuthentication !== undefined) return newestAuthentication;
          '''.replace(/^          /gm, ""),
              '''  const configured = openPages.filter((page) =>
            isConfiguredCopilotUrl(page.url(), config.entryUrl));
          if (configured.length > 1) {
            throw new AgentError("TRANSPORT_INDETERMINATE", "Multiple approved Copilot pages are open", {
              diagnosticCode: "AMBIGUOUS_COPILOT_PAGE",
              pageCount: configured.length,
            });
          }

          const authentication = openPages.filter((page) =>
            isGenuineManualAuthenticationUrl(page.url(), config));
          const configuredPage = configured[0];
          const newestEligible = openPages.findLast((page) =>
            page === configuredPage || authentication.includes(page));
          if (newestEligible !== undefined) return newestEligible;
          '''.replace(/^          /gm, ""),
          )

          test_anchor = '''test("broad Office and M365 allowlist entries are not reusable authentication pages by host alone", () => {
          '''.replace(/^          /gm, "")
          tests = '''test("a newer authentication popup takes precedence over an older configured chat", () => {
            const chat = new UrlPage("https://m365.cloud.microsoft/chat/conversation/synthetic");
            const authentication = new UrlPage(
              "https://login.microsoftonline.com/common/oauth2/authorize?step=signin",
            );

            const selected = selectActiveCopilotPage(
              [chat.asPage(), authentication.asPage()],
              selectionConfig,
              chat.asPage(),
            );

            assert.equal(selected, authentication.asPage());
          });

          test("a newer configured chat takes precedence after authentication returns", () => {
            const authentication = new UrlPage(
              "https://login.microsoftonline.com/common/oauth2/authorize?step=signin",
            );
            const chat = new UrlPage("https://m365.cloud.microsoft/chat/conversation/returned");

            const selected = selectActiveCopilotPage(
              [authentication.asPage(), chat.asPage()],
              selectionConfig,
              authentication.asPage(),
            );

            assert.equal(selected, chat.asPage());
          });

          '''.replace(/^          /gm, "")
          replace_once(
              "tests/unit/context-auth-page-selection.test.ts",
              test_anchor,
              tests + test_anchor,
          )

          replace_once(
              "docs/MACOS-EXPANSION-PLAN.md",
              '''- Windows wrapper SHA-256 values:
            - `scripts/install-windows.ps1`: `8f00cb314fea2be37f19db667c3e78ccd975a6cdb612ddd063b1119d3fb354e6`
            - `scripts/uninstall-windows.ps1`: `16b6d9eafb74ac06a2900d9f31f98018e49ec25b78742019b5ad830fb1796a50`
            - `install.cmd`: `8d56b5ac60e1f4365993927d1bc5d40ac11963208c7588954888fc3b62ce474c`
            - `install-cope.cmd`: `3ab30bf64882799b88f9e95883be507b7be325072d2a66f701a44b79f2a14794`
            - `uninstall.cmd`: `79af0b5fbb73ef97274737f367b456006f3dff9b33785a76698ee3620bb5abbb`
            - `uninstall-cope.cmd`: `28ef4abdc66216ea2ddb02f730e084f21179d7842a42a391ceb60d6468d02fdc`
          '''.replace(/^          /gm, ""),
              '''- Baseline Windows wrapper SHA-256 values (historical 0.1.1 snapshot; not current release hashes):
            - `scripts/install-windows.ps1`: `8f00cb314fea2be37f19db667c3e78ccd975a6cdb612ddd063b1119d3fb354e6`
            - `scripts/uninstall-windows.ps1`: `16b6d9eafb74ac06a2900d9f31f98018e49ec25b78742019b5ad830fb1796a50`
            - `install.cmd`: `8d56b5ac60e1f4365993927d1bc5d40ac11963208c7588954888fc3b62ce474c`
            - `install-cope.cmd`: `3ab30bf64882799b88f9e95883be507b7be325072d2a66f701a44b79f2a14794`
            - `uninstall.cmd`: `79af0b5fbb73ef97274737f367b456006f3dff9b33785a76698ee3620bb5abbb`
            - `uninstall-cope.cmd`: `28ef4abdc66216ea2ddb02f730e084f21179d7842a42a391ceb60d6468d02fdc`
          - Current release-preservation hashes are authoritative in `tests/unit/windows-preservation.test.ts`. For Cope 0.1.2, `scripts/install-windows.ps1` is `fc61cc22fd84a84b1d3973234874c942de0613f0ee48d1c7b06acd57bbe62b3d`.
          '''.replace(/^          /gm, ""),
          )
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - name: Commit final review fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/browser/context-semantic-page.ts tests/unit/context-auth-page-selection.test.ts docs/MACOS-EXPANSION-PLAN.md
          git commit -m "Prioritize newer authentication surfaces and clarify hashes"
          git pull --rebase origin agent/fix-visible-copilot-readiness-stall
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
