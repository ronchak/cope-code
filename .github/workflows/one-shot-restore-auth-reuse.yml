name: one-shot-restore-auth-reuse

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall

permissions:
  contents: write

jobs:
  fix:
    if: github.event.head_commit.message == 'Trigger auth reuse restoration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Restore existing authentication-page reuse
        shell: python
        run: |
          from pathlib import Path

          context_path = Path("src/browser/context-semantic-page.ts")
          context_text = context_path.read_text(encoding="utf-8")
          start = context_text.index("export async function openTrackedCopilotPage(")
          end = context_text.index("\nfunction isConfiguredCopilotUrl", start)
          replacement = '''export async function openTrackedCopilotPage(
            context: BrowserContext,
            config: EdgeLaunchConfig,
          ): Promise<ContextSemanticPage> {
            const existing = context.pages();
            const approved = existing.filter((page) =>
              !page.isClosed() && isConfiguredCopilotUrl(page.url(), config.entryUrl));
            if (approved.length > 1) {
              throw new AgentError("TRANSPORT_INDETERMINATE", "Multiple approved Copilot pages are open", {
                diagnosticCode: "AMBIGUOUS_COPILOT_PAGE",
                pageCount: approved.length,
              });
            }

            let initial = approved[0];
            if (initial === undefined) {
              const authentication = existing.filter((page) =>
                !page.isClosed() && isReusableExternalAuthenticationUrl(page.url(), config));
              initial = authentication.at(-1);
            }

            let tracked: ContextSemanticPage;
            if (initial === undefined) {
              initial = await context.newPage();
              // Install the native-dialog listener before navigation can execute page
              // script or open a replacement authentication window.
              tracked = new ContextSemanticPage(
                context,
                config,
                initial,
                config.waits.actionMs,
              );
              await initial.bringToFront().catch(() => undefined);
              const navigationDeadline = performance.now() + config.waits.actionMs;
              let navigationError: unknown;
              try {
                await initial.goto(config.entryUrl, {
                  waitUntil: "domcontentloaded",
                  timeout: config.waits.actionMs,
                });
              } catch (error) {
                navigationError = error;
              }
              if (!hasAllowedPage(context, config)) {
                const replacementFound = await waitForAllowedReplacementPage(
                  context,
                  config,
                  navigationDeadline,
                );
                if (!replacementFound) {
                  if (navigationError !== undefined) throw navigationError;
                  throw new AgentError(
                    "TRANSPORT_UNAVAILABLE",
                    "The dedicated Edge session did not open the configured Copilot surface",
                    {
                      diagnosticCode: "EDGE_NAVIGATION_NO_ALLOWED_PAGE",
                      next: "Close the dedicated Edge window, run cope setup --force, and retry.",
                    },
                  );
                }
              }
            } else {
              tracked = new ContextSemanticPage(
                context,
                config,
                initial,
                config.waits.actionMs,
              );
            }

            await tracked.focusActivePage(true);
            return tracked;
          }
          '''
          replacement = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in replacement.splitlines()
          ) + "\n"
          context_path.write_text(
              context_text[:start] + replacement + context_text[end + 1:],
              encoding="utf-8",
              newline="\n",
          )

          test_path = Path("tests/unit/context-semantic-page.test.ts")
          test_text = test_path.read_text(encoding="utf-8")
          anchor = 'test("tracked semantic page moves from Microsoft authentication to the returned Copilot tab", async () => {\n'
          addition = '''test("launch reuses a pre-existing external Microsoft authentication page", async () => {
            const authentication = new FakePage(authUrl);
            const context = new FakeContext([authentication]);
            const config = browserConfig();

            const tracked = await openTrackedCopilotPage(context.asContext(), config);

            assert.equal(context.newPageCalls, 0);
            assert.equal(await tracked.currentUrl(), authUrl);
            assert.ok(authentication.frontCount >= 1);
            assert.equal(authentication.defaultTimeout, config.waits.actionMs);
            assert.equal(authentication.defaultNavigationTimeout, config.waits.actionMs);
          });

          '''
          addition = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in addition.splitlines()
          ) + "\n"
          if test_text.count(anchor) != 1:
              raise RuntimeError("context semantic-page test anchor changed unexpectedly")
          test_path.write_text(
              test_text.replace(anchor, addition + anchor),
              encoding="utf-8",
              newline="\n",
          )
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - name: Commit restored authentication reuse
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/browser/context-semantic-page.ts tests/unit/context-semantic-page.test.ts
          git rm .github/workflows/one-shot-restore-auth-reuse.yml
          git commit -m "Restore existing authentication-page reuse"
          git pull --rebase origin agent/fix-visible-copilot-readiness-stall
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
