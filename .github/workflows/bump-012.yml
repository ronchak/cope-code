name: one-shot-cope-012-bump

on:
  push:
    branches:
      - agent/fix-visible-copilot-readiness-stall

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply coherent 0.1.2 release metadata
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').version === '0.1.2' ? 0 : 1)"; then
            echo "0.1.2 is already applied; nothing to do."
            exit 0
          fi
          npm version 0.1.2 --no-git-tag-version --ignore-scripts
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { readFile, writeFile } from 'node:fs/promises';

          async function replaceExact(filename, before, after) {
            const content = await readFile(filename, 'utf8');
            if (!content.includes(before)) throw new Error(`Missing expected version text in ${filename}: ${before}`);
            await writeFile(filename, content.replaceAll(before, after), 'utf8');
          }

          await replaceExact('src/cli/commands.ts', 'export const CLI_VERSION = "0.1.1";', 'export const CLI_VERSION = "0.1.2";');
          await replaceExact('scripts/install-windows.ps1', 'COPE 0.1.1 installer', 'COPE 0.1.2 installer');
          await replaceExact('scripts/install-windows.ps1', '$installedVersion -ne "0.1.1"', '$installedVersion -ne "0.1.2"');
          await replaceExact('START-HERE.txt', 'COPE 0.1.1 FOR WINDOWS', 'COPE 0.1.2 FOR WINDOWS');
          await replaceExact('docs/WINDOWS-TARGET.md', 'For the 0.1.1 personal-preview release', 'For the 0.1.2 personal-preview release');
          await replaceExact(
            'README.md',
            'The two previous Windows preflight failures were caused by tests invoking bare `git` while production already used the Windows Git resolver. Version 0.1.1 makes the tests use the same resolver and includes spawn diagnostics if Git genuinely fails.',
            'Version 0.1.2 adds context-aware Copilot tab tracking, bounded non-authentication readiness, and the current Microsoft 365 locator contract. Windows preflight tests continue to use the same deterministic Git resolver as production and include spawn diagnostics if Git genuinely fails.',
          );
          await replaceExact('tests/unit/cli-user-experience.test.ts', '0.1.1', '0.1.2');

          const releaseNotes = `# Cope 0.1.2 release notes

Version 0.1.2 hardens the visible Microsoft 365 Copilot launch path after live Windows target testing exposed stale-tab and readiness stalls.

## Main changes

- Tracks the active Copilot or approved Microsoft authentication tab instead of remaining pinned to an initial \`about:blank\` page.
- Requires the configured Copilot origin and chat path before a page can become submission-ready.
- Keeps multiple eligible Copilot pages as an ambiguity hard stop.
- Bounds persistent unknown, selector, identity, protection, streaming, throttling, and service-error states instead of waiting through the full manual-authentication window.
- Retains the long window only for manual sign-in, MFA, consent, and approved external Microsoft authentication redirects.
- Refreshes the versioned Microsoft 365 locator contract while preserving identity, protection, composer-actionability, and assistant-response ownership gates.
- Improves safe browser diagnostics without exposing URLs, account values, page text, prompts, or responses.

## Compatibility

The runtime requires Node.js 24 or newer. Authentication remains manual in a dedicated visible Edge profile. The hosted Windows and macOS lanes provide regression evidence; the target Windows machine still requires a live post-install acceptance run.
`;
          await writeFile('docs/RELEASE-NOTES-0.1.2.md', releaseNotes, 'utf8');

          const installer = await readFile('scripts/install-windows.ps1', 'utf8');
          const installerHash = createHash('sha256')
            .update(installer.replaceAll('\r\n', '\n'), 'utf8')
            .digest('hex');
          const preservationFile = 'tests/unit/windows-preservation.test.ts';
          const preservation = await readFile(preservationFile, 'utf8');
          const pattern = /(\"scripts\/install-windows\.ps1\": \.")[a-f0-9]{64}(\")/u;
          if (!pattern.test(preservation)) throw new Error('Missing frozen Windows installer hash');
          await writeFile(
            preservationFile,
            preservation.replace(pattern, `$1${installerHash}$2`),
            'utf8',
          );
          console.log(`Updated canonical installer SHA-256: ${installerHash}`);
          NODE
          if git grep -n '0\.1\.1' -- ':!docs/RELEASE-NOTES-0.1.1.md'; then
            echo 'Unexpected active 0.1.1 reference remains.' >&2
            exit 1
          fi
      - name: Verify generated lock and complete release
        shell: bash
        run: |
          npm ci --no-audit --no-fund
          npm run check
      - name: Commit coherent version bump
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/cli/commands.ts scripts/install-windows.ps1 START-HERE.txt README.md docs/WINDOWS-TARGET.md docs/RELEASE-NOTES-0.1.2.md tests/unit/cli-user-experience.test.ts tests/unit/windows-preservation.test.ts
          git commit -m "Release Cope 0.1.2"
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
