name: offline-matrix

on:
  push:
  pull_request:

jobs:
  reliability:
    name: deterministic-reliability
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      COPE_RELIABILITY_SEED: "1129271365"
      COPE_RELIABILITY_ITERATIONS: "24"
      COPE_RELIABILITY_ARTIFACT_DIR: reliability-artifacts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run test:reliability
      - name: Critical-boundary coverage
        run: mkdir -p reliability-artifacts && npm run test:coverage > reliability-artifacts/coverage.txt 2>&1
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-${{ github.run_id }}-${{ github.run_attempt }}
          path: reliability-artifacts/
          if-no-files-found: warn
          retention-days: 14

  offline:
    name: offline-${{ matrix.tuple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tuple: windows-x64
            os: windows-2025
          - tuple: macos-arm64
            os: macos-26
          - tuple: macos-x64
            os: macos-15-intel
    # Hosted offline lanes are regression evidence, not owner-tuple live certification.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - if: runner.os == 'macOS'
        run: sh -n scripts/install-macos.sh scripts/uninstall-macos.sh
      - if: runner.os == 'macOS'
        name: Clean-home install, uninstall, and reinstall smoke (not live certification)
        run: |
          clean_home="$RUNNER_TEMP/cope clean home"
          mkdir -p "$clean_home"
          chmod 700 "$clean_home"
          export HOME="$clean_home"
          export COPE_INSTALL_PREFIX="$HOME/.local"
          node_bin=$(dirname "$(command -v node)")
          export PATH="$node_bin:/usr/bin:/bin:/usr/sbin:/sbin"
          ./scripts/install-macos.sh --skip-build --skip-setup
          ./scripts/uninstall-macos.sh
          ./scripts/install-macos.sh --skip-build --skip-setup
          "$COPE_INSTALL_PREFIX/bin/cope" --version
          ./scripts/uninstall-macos.sh
