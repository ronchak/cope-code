name: offline-matrix

on:
  push:
  pull_request:

jobs:
  offline:
    name: offline-${{ matrix.tuple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tuple: windows-x64
            os: windows-2025
          - tuple: macos-arm64
            os: macos-26
          - tuple: macos-x64
            os: macos-15-intel
    # Hosted offline lanes are regression evidence, not owner-tuple live certification.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - if: runner.os == 'macOS'
        run: sh -n scripts/install-macos.sh scripts/uninstall-macos.sh
      - if: runner.os == 'macOS'
        name: Clean-home install, uninstall, and reinstall smoke (not live certification)
        run: |
          clean_home="$RUNNER_TEMP/cope clean home"
          mkdir -p "$clean_home"
          chmod 700 "$clean_home"
          export HOME="$clean_home"
          export COPE_INSTALL_PREFIX="$HOME/.local"
          node_bin=$(dirname "$(command -v node)")
          export PATH="$node_bin:/usr/bin:/bin:/usr/sbin:/sbin"
          ./scripts/install-macos.sh --skip-build --skip-setup
          ./scripts/uninstall-macos.sh
          ./scripts/install-macos.sh --skip-build --skip-setup
          "$COPE_INSTALL_PREFIX/bin/cope" --version
          ./scripts/uninstall-macos.sh

  release-012:
    name: verified-cope-0.1.2-bump
    needs: offline
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/fix-visible-copilot-readiness-stall'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-copilot-readiness-stall
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - id: version
        name: Detect whether the release bump is pending
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').version === '0.1.2' ? 0 : 1)"; then
            echo "pending=false" >> "$GITHUB_OUTPUT"
          else
            echo "pending=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.version.outputs.pending == 'true'
        run: python scripts/release-012.py
      - if: steps.version.outputs.pending == 'true'
        name: Verify the lockfile change is version-only
        shell: bash
        run: |
          git diff -- package-lock.json
          test "$(git diff --numstat -- package-lock.json | awk '{print $1+$2}')" -eq 4
      - if: steps.version.outputs.pending == 'true'
        run: npm ci --no-audit --no-fund
      - if: steps.version.outputs.pending == 'true'
        run: npm run check
      - if: steps.version.outputs.pending == 'true'
        name: Commit the coherent release bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/cli/commands.ts scripts/install-windows.ps1 START-HERE.txt README.md docs/WINDOWS-TARGET.md docs/RELEASE-NOTES-0.1.2.md tests/unit/cli-user-experience.test.ts tests/unit/windows-preservation.test.ts
          git commit -m "Release Cope 0.1.2"
          git push origin HEAD:agent/fix-visible-copilot-readiness-stall
