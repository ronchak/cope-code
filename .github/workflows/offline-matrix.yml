name: offline-matrix

on:
  push:
  pull_request:

jobs:
  offline:
    name: offline-${{ matrix.tuple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tuple: windows-x64
            os: windows-2025
          - tuple: macos-arm64
            os: macos-26
          - tuple: macos-x64
            os: macos-15-intel
    # Hosted offline lanes are regression evidence, not owner-tuple live certification.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Install pinned Chromium for browser safety tests
        run: npx --no-install playwright-core install chromium
      - name: Run Chromium safety tests with zero skips
        run: npm run test:chromium-safety
      - run: npm run check
      - if: runner.os == 'Windows'
        name: Isolated install and local update smoke (not live certification)
        shell: powershell
        run: |
          $prefix = Join-Path $env:RUNNER_TEMP "cope update prefix"
          $projectRoot = (Resolve-Path .).Path
          $previousSource = [Environment]::GetEnvironmentVariable("COPE_SOURCE_DIR", "User")
          $previousPath = [Environment]::GetEnvironmentVariable("Path", "User")
          $powershell = Join-Path $env:SystemRoot "System32\WindowsPowerShell\v1.0\powershell.exe"
          try {
            $env:npm_config_prefix = $prefix
            & $powershell -NoLogo -NoProfile -ExecutionPolicy Bypass -File scripts/install-windows.ps1 -SkipBuild -SkipSetup
            if ($LASTEXITCODE -ne 0) { throw "Initial isolated Windows install failed with exit code $LASTEXITCODE" }

            $persistedSource = [Environment]::GetEnvironmentVariable("COPE_SOURCE_DIR", "User")
            if ($persistedSource -ne $projectRoot) {
              throw "COPE_SOURCE_DIR was not persisted for the current user: $persistedSource"
            }
            $env:COPE_SOURCE_DIR = $persistedSource

            $cope = Join-Path $prefix "cope.cmd"
            & $cope update
            if ($LASTEXITCODE -ne 0) { throw "Installed cope update failed with exit code $LASTEXITCODE" }
            & $cope --version
            if ($LASTEXITCODE -ne 0) { throw "Updated cope launch check failed with exit code $LASTEXITCODE" }
          } finally {
            npm.cmd uninstall --global @local/copilot-browser-agent | Out-Host
            [Environment]::SetEnvironmentVariable("COPE_SOURCE_DIR", $previousSource, "User")
            [Environment]::SetEnvironmentVariable("Path", $previousPath, "User")
            Remove-Item -LiteralPath $prefix -Recurse -Force -ErrorAction SilentlyContinue
          }
      - if: runner.os == 'macOS'
        run: sh -n scripts/install-macos.sh scripts/uninstall-macos.sh
      - if: runner.os == 'macOS'
        name: Clean-home install, uninstall, and reinstall smoke (not live certification)
        run: |
          clean_home="$RUNNER_TEMP/cope clean home"
          mkdir -p "$clean_home"
          chmod 700 "$clean_home"
          export HOME="$clean_home"
          export COPE_INSTALL_PREFIX="$HOME/.local"
          node_bin=$(dirname "$(command -v node)")
          export PATH="$node_bin:/usr/bin:/bin:/usr/sbin:/sbin"
          ./scripts/install-macos.sh --skip-build --skip-setup
          ./scripts/uninstall-macos.sh
          ./scripts/install-macos.sh --skip-build --skip-setup
          "$COPE_INSTALL_PREFIX/bin/cope" --version
          ./scripts/uninstall-macos.sh
